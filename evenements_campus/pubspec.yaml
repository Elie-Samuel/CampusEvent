name: campus_event_clean
description: Application de gestion d'événements campus
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  flutter_localizations:
    sdk: flutter
  
  provider: ^6.0.5
  get_it: ^7.6.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  go_router: ^12.0.0
  google_fonts: ^6.1.0
  intl: ^0.20.2  # Mise à jour vers la version compatible
  mailer: ^6.0.0
  http: ^1.1.0
  image_picker: 1.0.4
  shared_preferences: ^2.5.5
  
  # QR Code dependencies
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.0
  share_plus: ^7.0.0
  
  # Notification dependencies
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FF6D00"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21